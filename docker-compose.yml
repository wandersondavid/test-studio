services:
  mongo:
    image: mongo:7
    container_name: test-studio-mongo
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    ports:
      - '${MONGO_HOST_PORT:-37017}:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: test-studio-api
    restart: unless-stopped
    ports:
      - '${API_HOST_PORT:-3001}:3001'
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/test-studio
      RUNNER_URL: http://host.docker.internal:3002
      ARTIFACTS_DIR: /app/artifacts
      JWT_SECRET: test-studio-dev-secret
      RUNNER_SHARED_SECRET: test-studio-runner-secret
      DEFAULT_ADMIN_EMAIL: admin@teststudio.local
      DEFAULT_ADMIN_PASSWORD: admin123456
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - artifacts:/app/artifacts

  runner:
    build:
      context: .
      dockerfile: infra/docker/runner.Dockerfile
    container_name: test-studio-runner
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: 3002
      API_URL: http://localhost:3001
      ARTIFACTS_DIR: /app/artifacts
      STEP_TIMEOUT_MS: 10000
      JWT_SECRET: test-studio-dev-secret
      RUNNER_SHARED_SECRET: test-studio-runner-secret
    depends_on:
      - api
    volumes:
      - artifacts:/app/artifacts

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: test-studio-web
    restart: unless-stopped
    ports:
      - '${WEB_HOST_PORT:-5173}:80'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      - api

volumes:
  mongo-data:
  artifacts:
