services:
  mongo:
    build: ./infra/docker/mongodb_replica
    container_name: test-studio-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-teststudio}
      MONGO_REPLICA_HOST: localhost
      MONGO_REPLICA_PORT: 27017
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: test-studio-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_USER:-root}:${MONGO_PASSWORD:-teststudio}@mongo:27017/test-studio?authSource=admin&replicaSet=rs0
      RUNNER_URL: http://runner:3002
      ARTIFACTS_DIR: /app/artifacts
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - artifacts:/app/artifacts

  runner:
    build:
      context: .
      dockerfile: infra/docker/runner.Dockerfile
    container_name: test-studio-runner
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      API_URL: http://api:3001
      ARTIFACTS_DIR: /app/artifacts
      STEP_TIMEOUT_MS: 10000
    depends_on:
      - api
    volumes:
      - artifacts:/app/artifacts

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: test-studio-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  mongo-data:
  artifacts:
